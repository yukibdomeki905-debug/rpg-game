<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>臨床検査技師RPG - ホーム</title>
  <meta name="robots" content="index,follow">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(to bottom, #0f172a, #1e293b);
      color: #fff;
      min-height: 100vh;
      padding: 16px;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
    }

    .title-box,
    .card {
      background: rgba(30, 41, 59, 0.96);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
    }

    .title-box {
      border: 2px solid #38bdf8;
      text-align: center;
      padding: 20px 16px;
    }

    .title-box h1 {
      margin: 0 0 8px;
      font-size: 26px;
    }

    .title-box p {
      margin: 0;
      color: #cbd5e1;
      font-size: 14px;
    }

    .section-title {
      font-size: 18px;
      margin: 0 0 12px;
      color: #7dd3fc;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      font-size: 15px;
    }

    .status-label {
      color: #cbd5e1;
    }

    .bar {
      width: 100%;
      height: 18px;
      background: #334155;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .bar-inner {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, #22c55e, #86efac);
      transition: width 0.4s ease;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .menu-btn {
      border: none;
      border-radius: 16px;
      padding: 18px 12px;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      min-height: 88px;
      width: 100%;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .menu-btn:active {
      transform: scale(0.98);
    }

    .menu-btn.quest { background: #0284c7; }
    .menu-btn.equipment { background: #7c3aed; }
    .menu-btn.status { background: #059669; }
    .menu-btn.data { background: #ea580c; }

    .menu-btn small {
      display: block;
      margin-top: 6px;
      font-size: 12px;
      font-weight: normal;
      opacity: 0.9;
    }

    .message-box {
      min-height: 64px;
      line-height: 1.6;
      color: #e2e8f0;
      font-size: 14px;
    }

    .footer-note {
      text-align: center;
      color: #94a3b8;
      font-size: 12px;
      margin-top: 12px;
    }

    @media (max-width: 380px) {
      .menu-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="title-box">
      <h1>🧪 臨床検査技師RPG</h1>
      <p>知識を集めて、検査の冒険へ出よう</p>
    </div>

    <div class="card">
      <h2 class="section-title">プレイヤー情報</h2>

      <div class="status-row">
        <span class="status-label">名前</span>
        <span id="playerName">プレイヤー</span>
      </div>

      <div class="status-row">
        <span class="status-label">レベル</span>
        <span id="playerLevel">1</span>
      </div>

      <div class="status-row">
        <span class="status-label">EXP</span>
        <span><span id="playerExp">0</span> / <span id="nextExp">100</span></span>
      </div>

      <div class="status-row">
        <span class="status-label">称号</span>
        <span id="playerTitle">見習い検査技師</span>
      </div>

      <div class="bar">
        <div class="bar-inner" id="expBar"></div>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">現在装備</h2>

      <div class="status-row">
        <span class="status-label">白衣</span>
        <span id="equipCoat">標準白衣</span>
      </div>
      <div class="status-row">
        <span class="status-label">手袋</span>
        <span id="equipGloves">未装備</span>
      </div>
      <div class="status-row">
        <span class="status-label">ゴーグル</span>
        <span id="equipGoggles">未装備</span>
      </div>
      <div class="status-row">
        <span class="status-label">顕微鏡</span>
        <span id="equipMicroscope">未装備</span>
      </div>
      <div class="status-row">
        <span class="status-label">ピペット</span>
        <span id="equipPipette">未装備</span>
      </div>
      <div class="status-row">
        <span class="status-label">バッジ</span>
        <span id="equipBadge">なし</span>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">ホームメニュー</h2>

      <div class="menu-grid">
        <button class="menu-btn quest" onclick="goQuest()">
          ⚔️ クエスト
          <small>問題に挑戦する</small>
        </button>

        <button class="menu-btn equipment" onclick="goEquipment()">
          🛡️ 装備
          <small>所持品・装備変更</small>
        </button>

        <button class="menu-btn status" onclick="showStatus()">
          📊 ステータス
          <small>成長状態を見る</small>
        </button>

        <button class="menu-btn data" onclick="showSaveData()">
          💾 データ
          <small>保存状況を確認</small>
        </button>
      </div>
    </div>

    <div class="card" id="questMenu" style="display: none;">
      <h2 class="section-title">クエスト難易度を選ぶ</h2>

      <div class="menu-grid">
        <button class="menu-btn quest" onclick="openQuest('beginner')">
          🌱 初級
          <small>基本問題</small>
        </button>

        <button class="menu-btn status" onclick="openQuest('intermediate')">
          📘 中級
          <small>応用問題</small>
        </button>

        <button class="menu-btn data" onclick="openQuest('advanced')">
          🔥 上級
          <small>国家試験レベル</small>
        </button>

        <button class="menu-btn equipment" onclick="closeQuestMenu()">
          ↩ 戻る
          <small>ホームに戻る</small>
        </button>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">案内メッセージ</h2>
      <div class="message-box" id="messageBox">
        ようこそ。クエストに挑戦したり、装備画面で所持品を確認したりできます。
      </div>
    </div>

    <div class="footer-note">
      装備は端末内に保存されます。あとでクエスト達成に応じた解放も追加できます。
    </div>
  </div>

  <script>
    const defaultPlayer = {
      name: "プレイヤー",
      exp: 0,
      title: "見習い検査技師",
      equipment: {
        coat: "標準白衣",
        gloves: "未装備",
        goggles: "未装備",
        microscope: "未装備",
        pipette: "未装備",
        badge: "なし"
      },
      inventory: {
        coat: ["標準白衣"],
        gloves: [],
        goggles: [],
        microscope: [],
        pipette: [],
        badge: []
      },
      lockedItems: {
        coat: ["高機能白衣"],
        gloves: ["ラテックス手袋", "ニトリル手袋"],
        goggles: ["防護ゴーグル"],
        microscope: ["基礎顕微鏡", "高精度顕微鏡"],
        pipette: ["標準ピペット", "マイクロピペット"],
        badge: ["血液検査バッジ", "微生物検査バッジ", "生化学検査バッジ"]
      }
    };

    let player = loadPlayer();

    function loadPlayer() {
      const saved = localStorage.getItem("player");
      if (!saved) {
        localStorage.setItem("player", JSON.stringify(defaultPlayer));
        return JSON.parse(JSON.stringify(defaultPlayer));
      }

      const parsed = JSON.parse(saved);

      return {
        ...JSON.parse(JSON.stringify(defaultPlayer)),
        ...parsed,
        equipment: {
          ...defaultPlayer.equipment,
          ...(parsed.equipment || {})
        },
        inventory: {
          ...defaultPlayer.inventory,
          ...(parsed.inventory || {})
        },
        lockedItems: {
          ...defaultPlayer.lockedItems,
          ...(parsed.lockedItems || {})
        }
      };
    }

    function savePlayer() {
      localStorage.setItem("player", JSON.stringify(player));
    }

    function getLevel(exp) {
      return Math.floor(exp / 100) + 1;
    }

    function getNextExp(exp) {
      return Math.floor(exp / 100) * 100 + 100;
    }

    function updateUI() {
      const level = getLevel(player.exp);
      const nextExp = getNextExp(player.exp);
      const currentExp = player.exp % 100;
      const percent = currentExp;

      document.getElementById("playerName").textContent = player.name;
      document.getElementById("playerLevel").textContent = level;
      document.getElementById("playerExp").textContent = player.exp;
      document.getElementById("nextExp").textContent = nextExp;
      document.getElementById("playerTitle").textContent = player.title;
      document.getElementById("expBar").style.width = percent + "%";

      document.getElementById("equipCoat").textContent = player.equipment.coat;
      document.getElementById("equipGloves").textContent = player.equipment.gloves;
      document.getElementById("equipGoggles").textContent = player.equipment.goggles;
      document.getElementById("equipMicroscope").textContent = player.equipment.microscope;
      document.getElementById("equipPipette").textContent = player.equipment.pipette;
      document.getElementById("equipBadge").textContent = player.equipment.badge;
    }

    function setMessage(text) {
      document.getElementById("messageBox").textContent = text;
    }

    function goQuest() {
      document.getElementById("questMenu").style.display = "block";
      setMessage("挑戦する難易度を選んでください。");
    }

    function closeQuestMenu() {
      document.getElementById("questMenu").style.display = "none";
      setMessage("ホームに戻りました。");
    }

    function openQuest(level) {
      const urls = {
        beginner: "ここに初級フォームURL",
        intermediate: "ここに中級フォームURL",
        advanced: "ここに上級フォームURL"
      };

      if (!urls[level] || urls[level].includes("ここに")) {
        alert("まだこの難易度のフォームURLが設定されていません");
        return;
      }

      window.open(urls[level], "_blank");
    }

    function goEquipment() {
      location.href = "equipment.html";
    }

    function showStatus() {
      const level = getLevel(player.exp);
      setMessage(
        "名前：" + player.name +
        " / レベル：" + level +
        " / 総EXP：" + player.exp +
        " / 称号：" + player.title
      );
    }

    function showSaveData() {
      const exists = localStorage.getItem("player") ? "保存されています" : "未保存です";
      setMessage("セーブデータはこの端末のブラウザ内に " + exists + "。");
    }

    updateUI();
  </script>
</body>
</html>
