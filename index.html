<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>臨床検査技師RPG - ホーム</title>
  <meta name="robots" content="index,follow">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(to bottom, #0f172a, #1e293b);
      color: #fff;
      min-height: 100vh;
      padding: 16px;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
    }

    .card {
      background: rgba(30, 41, 59, 0.96);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 16px;
    }

    h1 { text-align: center; }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .menu-btn {
      border: none;
      border-radius: 16px;
      padding: 16px;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .quest { background: #0284c7; }
    .equipment { background: #7c3aed; }
    .status { background: #059669; }
    .data { background: #ea580c; }

    .bar {
      width: 100%;
      height: 20px;
      background: #333;
      border-radius: 999px;
    }

    .bar-inner {
      height: 100%;
      background: lime;
      width: 0%;
    }
  </style>
</head>

<body>
<div class="container">

  <h1>🧪 検査技師RPG</h1>

  <div class="card">
    <div>名前：<span id="playerName">プレイヤー</span></div>
    <div>Lv：<span id="playerLevel">1</span></div>
    <div>EXP：<span id="playerExp">0</span></div>

    <div class="bar">
      <div class="bar-inner" id="expBar"></div>
    </div>
  </div>

  <div class="card">
    <h2>ホームメニュー</h2>

    <div class="menu-grid">
      <button class="menu-btn quest" onclick="goQuest()">⚔️ クエスト</button>
      <button class="menu-btn equipment" onclick="goEquipment()">🛡️ 装備</button>
      <button class="menu-btn status" onclick="showStatus()">📊 ステータス</button>
      <button class="menu-btn data" onclick="showSaveData()">💾 データ</button>
    </div>
  </div>

  <!-- 👇 ここが追加されたクエスト分岐 -->
  <div class="card" id="questMenu" style="display:none;">
    <h2>難易度選択</h2>

    <div class="menu-grid">
      <button class="menu-btn quest" onclick="openQuest('beginner')">🌱 初級</button>
      <button class="menu-btn status" onclick="openQuest('intermediate')">📘 中級</button>
      <button class="menu-btn data" onclick="openQuest('advanced')">🔥 上級</button>
      <button class="menu-btn equipment" onclick="closeQuestMenu()">↩ 戻る</button>
    </div>
  </div>

</div>

<script>
let player = { name: "プレイヤー", exp: 0 };

if (localStorage.getItem("player")) {
  player = JSON.parse(localStorage.getItem("player"));
}

function updateUI() {
  document.getElementById("playerName").textContent = player.name;
  document.getElementById("playerLevel").textContent = Math.floor(player.exp/100)+1;
  document.getElementById("playerExp").textContent = player.exp;
  document.getElementById("expBar").style.width = (player.exp % 100) + "%";
}

function goQuest() {
  document.getElementById("questMenu").style.display = "block";
}

function closeQuestMenu() {
  document.getElementById("questMenu").style.display = "none";
}

function openQuest(level) {
  const urls = {
    beginner: "https://docs.google.com/forms/d/1COLc_O_xq7NzbqLBKSMuHYiBn4CngupIqvqxpLvX6gg/edit",
    intermediate: "ここに中級フォームURL",
    advanced: "ここに上級フォームURL"
  };

  window.open(urls[level], "_blank");
}

function goEquipment() {
  alert("装備画面はこれから作成");
}

function showStatus() {
  alert("Lv: " + (Math.floor(player.exp/100)+1));
}

function showSaveData() {
  alert("この端末に保存されています");
}

updateUI();
</script>

</body>
</html>
