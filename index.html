<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>臨床検査技師RPG - ホーム</title>
  <meta name="robots" content="index,follow">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(to bottom, #0f172a, #1e293b);
      color: #fff;
      min-height: 100vh;
      padding: 16px;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
    }

    .title-box {
      background: rgba(30, 41, 59, 0.95);
      border: 2px solid #38bdf8;
      border-radius: 18px;
      padding: 20px 16px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      margin-bottom: 16px;
    }

    .title-box h1 {
      margin: 0 0 8px;
      font-size: 26px;
    }

    .title-box p {
      margin: 0;
      color: #cbd5e1;
      font-size: 14px;
    }

    .card {
      background: rgba(30, 41, 59, 0.96);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
    }

    .section-title {
      font-size: 18px;
      margin: 0 0 12px;
      color: #7dd3fc;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      font-size: 15px;
    }

    .status-label {
      color: #cbd5e1;
    }

    .bar {
      width: 100%;
      height: 18px;
      background: #334155;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .bar-inner {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, #22c55e, #86efac);
      transition: width 0.4s ease;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .menu-btn {
      border: none;
      border-radius: 16px;
      padding: 18px 12px;
      background: #334155;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      min-height: 88px;
      transition: transform 0.15s ease, background 0.15s ease;
      width: 100%;
    }

    .menu-btn:active {
      transform: scale(0.98);
    }

    .menu-btn.quest {
      background: #0284c7;
    }

    .menu-btn.equipment {
      background: #7c3aed;
    }

    .menu-btn.status {
      background: #059669;
    }

    .menu-btn.data {
      background: #ea580c;
    }

    .menu-btn small {
      display: block;
      margin-top: 6px;
      font-size: 12px;
      font-weight: normal;
      opacity: 0.9;
    }

    .message-box {
      min-height: 64px;
      line-height: 1.6;
      color: #e2e8f0;
      font-size: 14px;
    }

    .footer-note {
      text-align: center;
      color: #94a3b8;
      font-size: 12px;
      margin-top: 12px;
    }

    .login-input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      margin-bottom: 12px;
    }

    .sub-text {
      font-size: 13px;
      color: #cbd5e1;
      margin-top: 8px;
    }

    @media (max-width: 380px) {
      .menu-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="title-box">
      <h1>🧪 臨床検査技師RPG</h1>
      <p>知識を集めて、検査の冒険へ出よう</p>
    </div>

    <div class="card">
      <h2 class="section-title">ログイン</h2>
      <input
        type="text"
        id="studentId"
        class="login-input"
        placeholder="学籍番号5桁を入力（例: 11062）"
        maxlength="5"
        inputmode="numeric"
      >
      <button class="menu-btn quest" onclick="login()">
        🔐 ログイン
      </button>
      <div class="sub-text">
        学籍番号だけの簡単ログインです。同じ端末・同じブラウザでは自動保存されます。
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">プレイヤー情報</h2>

      <div class="status-row">
        <span class="status-label">学籍番号</span>
        <span id="playerName">未ログイン</span>
      </div>

      <div class="status-row">
        <span class="status-label">レベル</span>
        <span id="playerLevel">1</span>
      </div>

      <div class="status-row">
        <span class="status-label">EXP</span>
        <span><span id="playerExp">0</span> / <span id="nextExp">100</span></span>
      </div>

      <div class="bar">
        <div class="bar-inner" id="expBar"></div>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">ホームメニュー</h2>

      <div class="menu-grid">
        <button class="menu-btn quest" onclick="goQuest()">
          ⚔️ クエスト
          <small>問題に挑戦する</small>
        </button>

        <button class="menu-btn equipment" onclick="goEquipment()">
          🛡️ 装備
          <small>称号・道具を見る</small>
        </button>

        <button class="menu-btn status" onclick="showStatus()">
          📊 ステータス
          <small>現在の成長を見る</small>
        </button>

        <button class="menu-btn data" onclick="showSaveData()">
          💾 データ
          <small>保存状況を確認</small>
        </button>
      </div>
    </div>

    <div class="card" id="questMenu" style="display: none;">
      <h2 class="section-title">クエスト難易度を選ぶ</h2>

      <div class="menu-grid">
        <button class="menu-btn quest" onclick="openQuest('beginner')">
          🌱 初級
          <small>基本問題</small>
        </button>

        <button class="menu-btn status" onclick="openQuest('intermediate')">
          📘 中級
          <small>応用問題</small>
        </button>

        <button class="menu-btn data" onclick="openQuest('advanced')">
          🔥 上級
          <small>国家試験レベル</small>
        </button>

        <button class="menu-btn equipment" onclick="closeQuestMenu()">
          ↩ 戻る
          <small>ホームに戻る</small>
        </button>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">案内メッセージ</h2>
      <div class="message-box" id="messageBox">
        まずは学籍番号でログインしてください。
      </div>
    </div>

    <div class="footer-note">
      今はホーム画面の土台です。あとで装備画面やEXP自動反映を追加できます。
    </div>
  </div>

  <script>
    let player = {
      name: "",
      exp: 0,
      equipment: "白衣",
      title: "見習い検査技師"
    };

    const savedPlayer = localStorage.getItem("player");
    if (savedPlayer) {
      player = JSON.parse(savedPlayer);
    }

    function getLevel(exp) {
      return Math.floor(exp / 100) + 1;
    }

    function getNextExp(exp) {
      return Math.floor(exp / 100) * 100 + 100;
    }

    function updateUI() {
      const level = getLevel(player.exp);
      const nextExp = getNextExp(player.exp);
      const currentExp = player.exp % 100;
      const percent = currentExp;

      document.getElementById("playerName").textContent = player.name || "未ログイン";
      document.getElementById("playerLevel").textContent = level;
      document.getElementById("playerExp").textContent = player.exp;
      document.getElementById("nextExp").textContent = nextExp;
      document.getElementById("expBar").style.width = percent + "%";

      const studentIdInput = document.getElementById("studentId");
      if (player.name) {
        studentIdInput.value = player.name;
      }
    }

    function savePlayer() {
      localStorage.setItem("player", JSON.stringify(player));
    }

    function setMessage(text) {
      document.getElementById("messageBox").textContent = text;
    }

    function login() {
      const id = document.getElementById("studentId").value.trim();

      if (!/^[0-9]{5}$/.test(id)) {
        alert("学籍番号は5桁の数字で入力してください");
        return;
      }

      player.name = id;
      savePlayer();
      updateUI();
      setMessage("学籍番号 " + id + " でログインしました。クエストに進めます。");
    }

    function goQuest() {
      if (!player.name) {
        alert("先に学籍番号でログインしてください");
        return;
      }

      document.getElementById("questMenu").style.display = "block";
      setMessage("挑戦する難易度を選んでください。");
    }

    function closeQuestMenu() {
      document.getElementById("questMenu").style.display = "none";
      setMessage("ホームに戻りました。");
    }

    function openQuest(level) {
      if (!player.name) {
        alert("先に学籍番号でログインしてください");
        return;
      }

      const urls = {
        beginner: "https://docs.google.com/forms/d/1br0mN6Gw4L4XhkPxeDjwSu5lx8JX207fyVxiuepKDuc/edit",
        intermediate: "ここに中級フォームURL",
        advanced: "ここに上級フォームURL"
      };

      if (!urls[level] || urls[level].includes("ここに")) {
        alert("まだこの難易度のフォームURLが設定されていません");
        return;
      }

      window.open(urls[level], "_blank");
    }

    function goEquipment() {
      setMessage("装備画面は次に作成できます。今は白衣と称号のようなデータを保存できます。");
    }

    function showStatus() {
      const level = getLevel(player.exp);
      setMessage(
        "学籍番号：" + (player.name || "未ログイン") +
        " / レベル：" + level +
        " / 総EXP：" + player.exp +
        " / 称号：" + (player.title || "なし")
      );
    }

    function showSaveData() {
      const exists = localStorage.getItem("player") ? "保存されています" : "未保存です";
      setMessage("セーブデータはこの端末のブラウザ内に " + exists + "。別端末共有は今後スプレッドシート連携で対応できます。");
    }

    updateUI();
  </script>
</body>
</html>
