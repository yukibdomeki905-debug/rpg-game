<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>臨床検査技師RPG - 装備</title>
  <meta name="robots" content="index,follow">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(to bottom, #111827, #1f2937);
      color: #fff;
      min-height: 100vh;
      padding: 16px;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
    }

    .card {
      background: rgba(31, 41, 55, 0.96);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
    }

    h1 {
      text-align: center;
      margin: 0 0 16px;
      color: #93c5fd;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
      color: #7dd3fc;
    }

    .slot {
      border: 1px solid #475569;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      background: rgba(15, 23, 42, 0.55);
    }

    .slot-title {
      font-weight: bold;
      margin-bottom: 8px;
      color: #e2e8f0;
    }

    .current {
      margin-bottom: 10px;
      color: #cbd5e1;
      font-size: 14px;
    }

    select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      margin-bottom: 8px;
    }

    .desc {
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.6;
    }

    .item-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      background: #334155;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
    }

    .chip.locked {
      background: #3f3f46;
      color: #a1a1aa;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
      color: white;
    }

    .save-btn {
      background: #059669;
    }

    .back-btn {
      background: #2563eb;
    }

    .unlock-btn {
      background: #7c3aed;
    }

    .message {
      margin-top: 8px;
      font-size: 14px;
      color: #cbd5e1;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛡️ 装備画面</h1>

    <div class="card">
      <h2>現在の称号</h2>
      <div id="titleText">見習い検査技師</div>
    </div>

    <div class="card">
      <h2>装備変更</h2>

      <div class="slot">
        <div class="slot-title">白衣</div>
        <div class="current">現在装備：<span id="currentCoat"></span></div>
        <select id="coatSelect"></select>
        <div class="desc">検査室での基本装備。成長すると高機能白衣も解放されます。</div>
      </div>

      <div class="slot">
        <div class="slot-title">手袋</div>
        <div class="current">現在装備：<span id="currentGloves"></span></div>
        <select id="glovesSelect"></select>
        <div class="desc">安全対策に必要な装備。ラテックス手袋やニトリル手袋が追加されます。</div>
      </div>

      <div class="slot">
        <div class="slot-title">ゴーグル</div>
        <div class="current">現在装備：<span id="currentGoggles"></span></div>
        <select id="gogglesSelect"></select>
        <div class="desc">飛沫や薬液から目を守る装備です。</div>
      </div>

      <div class="slot">
        <div class="slot-title">顕微鏡</div>
        <div class="current">現在装備：<span id="currentMicroscope"></span></div>
        <select id="microscopeSelect"></select>
        <div class="desc">微生物や血液細胞の観察に使います。</div>
      </div>

      <div class="slot">
        <div class="slot-title">ピペット</div>
        <div class="current">現在装備：<span id="currentPipette"></span></div>
        <select id="pipetteSelect"></select>
        <div class="desc">精密な液量操作のための器具です。</div>
      </div>

      <div class="slot">
        <div class="slot-title">バッジ</div>
        <div class="current">現在装備：<span id="currentBadge"></span></div>
        <select id="badgeSelect"></select>
        <div class="desc">特定分野を極めると検査バッジを装備できます。</div>
      </div>

      <button class="btn save-btn" onclick="saveEquipment()">装備を保存する</button>
      <div class="message" id="messageBox">所持している装備から選べます。</div>
    </div>

    <div class="card">
      <h2>所持品一覧</h2>

      <div class="slot">
        <div class="slot-title">所持中</div>
        <div id="ownedItems"></div>
      </div>

      <div class="slot">
        <div class="slot-title">未解放</div>
        <div id="lockedItems"></div>
      </div>

      <button class="btn unlock-btn" onclick="unlockSampleItems()">テスト用に装備を解放する</button>
      <div class="message">動作確認用です。あとでクエスト達成時の解放に置き換えられます。</div>
    </div>

    <div class="card">
      <button class="btn back-btn" onclick="goHome()">ホームに戻る</button>
    </div>
  </div>

  <script>
    const defaultPlayer = {
      name: "プレイヤー",
      exp: 0,
      title: "見習い検査技師",
      equipment: {
        coat: "標準白衣",
        gloves: "未装備",
        goggles: "未装備",
        microscope: "未装備",
        pipette: "未装備",
        badge: "なし"
      },
      inventory: {
        coat: ["標準白衣"],
        gloves: [],
        goggles: [],
        microscope: [],
        pipette: [],
        badge: []
      },
      lockedItems: {
        coat: ["高機能白衣"],
        gloves: ["ラテックス手袋", "ニトリル手袋"],
        goggles: ["防護ゴーグル"],
        microscope: ["基礎顕微鏡", "高精度顕微鏡"],
        pipette: ["標準ピペット", "マイクロピペット"],
        badge: ["血液検査バッジ", "微生物検査バッジ", "生化学検査バッジ"]
      }
    };

    const itemDescriptions = {
      "標準白衣": "基本の白衣。見習い技師の第一歩。",
      "高機能白衣": "高性能素材の白衣。熟練者の証。",
      "未装備": "まだ装備していません。",
      "ラテックス手袋": "標準的な検査用手袋。",
      "ニトリル手袋": "耐薬品性に優れた手袋。",
      "防護ゴーグル": "目を保護する安全装備。",
      "基礎顕微鏡": "初学者向けの顕微鏡。",
      "高精度顕微鏡": "上級者向けの観察装置。",
      "標準ピペット": "基本的な液量操作器具。",
      "マイクロピペット": "微量操作に適した器具。",
      "血液検査バッジ": "血液分野の達成証。",
      "微生物検査バッジ": "微生物分野の達成証。",
      "生化学検査バッジ": "生化学分野の達成証。",
      "なし": "装備していません。"
    };

    let player = loadPlayer();

    function loadPlayer() {
      const saved = localStorage.getItem("player");
      if (!saved) {
        localStorage.setItem("player", JSON.stringify(defaultPlayer));
        return JSON.parse(JSON.stringify(defaultPlayer));
      }

      const parsed = JSON.parse(saved);

      return {
        ...JSON.parse(JSON.stringify(defaultPlayer)),
        ...parsed,
        equipment: {
          ...defaultPlayer.equipment,
          ...(parsed.equipment || {})
        },
        inventory: {
          ...defaultPlayer.inventory,
          ...(parsed.inventory || {})
        },
        lockedItems: {
          ...defaultPlayer.lockedItems,
          ...(parsed.lockedItems || {})
        }
      };
    }

    function savePlayer() {
      localStorage.setItem("player", JSON.stringify(player));
    }

    function renderSelect(selectId, items, currentValue, emptyLabel) {
      const select = document.getElementById(selectId);
      select.innerHTML = "";

      const allItems = [emptyLabel, ...items];
      const uniqueItems = [...new Set(allItems)];

      uniqueItems.forEach(item => {
        const option = document.createElement("option");
        option.value = item;
        option.textContent = item;
        if (item === currentValue) {
          option.selected = true;
        }
        select.appendChild(option);
      });
    }

    function renderEquipment() {
      document.getElementById("titleText").textContent = player.title;

      document.getElementById("currentCoat").textContent = player.equipment.coat;
      document.getElementById("currentGloves").textContent = player.equipment.gloves;
      document.getElementById("currentGoggles").textContent = player.equipment.goggles;
      document.getElementById("currentMicroscope").textContent = player.equipment.microscope;
      document.getElementById("currentPipette").textContent = player.equipment.pipette;
      document.getElementById("currentBadge").textContent = player.equipment.badge;

      renderSelect("coatSelect", player.inventory.coat, player.equipment.coat, "未装備");
      renderSelect("glovesSelect", player.inventory.gloves, player.equipment.gloves, "未装備");
      renderSelect("gogglesSelect", player.inventory.goggles, player.equipment.goggles, "未装備");
      renderSelect("microscopeSelect", player.inventory.microscope, player.equipment.microscope, "未装備");
      renderSelect("pipetteSelect", player.inventory.pipette, player.equipment.pipette, "未装備");
      renderSelect("badgeSelect", player.inventory.badge, player.equipment.badge, "なし");

      renderItemLists();
    }

    function renderItemLists() {
      const owned = document.getElementById("ownedItems");
      const locked = document.getElementById("lockedItems");

      owned.innerHTML = "";
      locked.innerHTML = "";

      const ownedGroups = [
        ...player.inventory.coat,
        ...player.inventory.gloves,
        ...player.inventory.goggles,
        ...player.inventory.microscope,
        ...player.inventory.pipette,
        ...player.inventory.badge
      ];

      const lockedGroups = [
        ...player.lockedItems.coat,
        ...player.lockedItems.gloves,
        ...player.lockedItems.goggles,
        ...player.lockedItems.microscope,
        ...player.lockedItems.pipette,
        ...player.lockedItems.badge
      ];

      if (ownedGroups.length === 0) {
        owned.innerHTML = "<div class='chip'>所持品なし</div>";
      } else {
        const wrap = document.createElement("div");
        wrap.className = "item-list";
        ownedGroups.forEach(item => {
          const div = document.createElement("div");
          div.className = "chip";
          div.textContent = item;
          wrap.appendChild(div);
        });
        owned.appendChild(wrap);
      }

      if (lockedGroups.length === 0) {
        locked.innerHTML = "<div class='chip'>すべて解放済み</div>";
      } else {
        const wrap = document.createElement("div");
        wrap.className = "item-list";
        lockedGroups.forEach(item => {
          const div = document.createElement("div");
          div.className = "chip locked";
          div.textContent = item;
          wrap.appendChild(div);
        });
        locked.appendChild(wrap);
      }
    }

    function saveEquipment() {
      player.equipment.coat = document.getElementById("coatSelect").value;
      player.equipment.gloves = document.getElementById("glovesSelect").value;
      player.equipment.goggles = document.getElementById("gogglesSelect").value;
      player.equipment.microscope = document.getElementById("microscopeSelect").value;
      player.equipment.pipette = document.getElementById("pipetteSelect").value;
      player.equipment.badge = document.getElementById("badgeSelect").value;

      savePlayer();
      renderEquipment();

      document.getElementById("messageBox").textContent = "装備を保存しました。ホーム画面にも反映されます。";
    }

    function unlockSampleItems() {
      unlockOne("gloves", "ラテックス手袋");
      unlockOne("goggles", "防護ゴーグル");
      unlockOne("microscope", "基礎顕微鏡");
      unlockOne("pipette", "標準ピペット");
      unlockOne("badge", "血液検査バッジ");
      updateTitleByInventory();
      savePlayer();
      renderEquipment();

      document.getElementById("messageBox").textContent = "テスト用に装備を解放しました。";
    }

    function unlockOne(category, itemName) {
      if (!player.inventory[category].includes(itemName)) {
        player.inventory[category].push(itemName);
      }
      player.lockedItems[category] = player.lockedItems[category].filter(item => item !== itemName);
    }

    function updateTitleByInventory() {
      const totalOwned =
        player.inventory.coat.length +
        player.inventory.gloves.length +
        player.inventory.goggles.length +
        player.inventory.microscope.length +
        player.inventory.pipette.length +
        player.inventory.badge.length;

      if (totalOwned >= 6) {
        player.title = "検査室の探究者";
      } else if (totalOwned >= 3) {
        player.title = "装備を整えし者";
      } else {
        player.title = "見習い検査技師";
      }
    }

    function goHome() {
      location.href = "index.html";
    }

    renderEquipment();
  </script>
</body>
</html>
